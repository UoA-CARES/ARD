# Eureka refinement parameters
iteration: 5    # how many refinement iterations to run
num_eval: 5     # times the best reward is re-trained to score it (the eval phase)
base_seed: 42   # eval-phase seeds are base_seed + k (only used by a {seed}-aware command_template)


# Eureka agent (LLM) settings
agent:
# qwen/qwen3-coder-30b-a3b-instruct
# deepseek/deepseek-r1
# anthropic/claude-sonnet-4.5
  model: "deepseek/deepseek-v4-pro"   #  "x-ai/grok-code-fast-1" # 'deepseek/deepseek-r1:free' # "anthropic/claude-3.7-sonnet:thinking"
  base_url: "https://openrouter.ai/api/v1"
  sample: 16        # reward candidates generated per iteration (the run phase)
  temperature: 0.8  # LLM sampling temperature
