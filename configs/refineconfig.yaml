# Eureka refinement parameters
iteration: 5    # how many refinement iterations to run
num_eval: 4     # times the best reward is re-trained to score it (the eval phase)
base_seed: 42   # eval-phase seeds are base_seed + k (passed to each job as env SEED -> train.py --seed)


# Eureka agent (LLM) settings
agent:
# qwen/qwen3-coder-30b-a3b-instruct
# deepseek/deepseek-v4-pro
# anthropic/claude-sonnet-4.5
  model: "qwen/qwen3-coder-30b-a3b-instruct"   #  "x-ai/grok-code-fast-1" # 'deepseek/deepseek-r1:free' # "anthropic/claude-3.7-sonnet:thinking"
  base_url: "https://openrouter.ai/api/v1"
  sample: 16        # reward candidates generated per iteration (the run phase)
  temperature: 1.0  # LLM sampling temperature (raised for exploration variety)
  top_p: 0.95       # nucleus sampling; <1.0 widens the candidate distribution
  # Each candidate also gets a distinct sampler seed to diversify the batch beyond
  # what temperature/top_p alone provide.
