# ARD pipeline settings
# ---------------------

# Path to the ard-isaaclab-tasks checkout — the RL task substrate ARD trains
# against. Each candidate reward is injected into a task env file inside a fresh
# copy of this repo, packaged, and submitted to the coordinator.
tasks_repo: "/home/rlt/ard-isaaclab-tasks"

# Where ARD downloads artifacts and writes extracted logs / per-run records.
output_dir: "./runs"

# Parallel Coordination System (PCS) coordinator that schedules and runs the
# training jobs across registered GPU workers. ARD is a pure client of it.
coordinator:
  base_url: "http://localhost:8000"
  # Bearer token. Preferred: export TOKEN. Alternatively set `token:` here
  # (avoid committing secrets). token_env names the env var to read.
  token_env: "TOKEN"
  # Training image, prebuilt on the workers from ard-isaaclab-tasks/Dockerfile.
  docker_image: "pcs-isaaclab-ard:2.3.2"
  gpus: 1
  timeout_seconds: 3600
  poll_interval: 10
  # Output paths the coordinator collects into each job's artifacts tarball.
  output_paths: ["logs/"]
  # Command the worker runs from the codebase root.
  # Placeholders: {task}, {seed} (seed only takes effect if you reference it —
  # the default quickstart path does not vary the seed; switch to the train.py
  # form below to vary seeds per evaluation run). max_epochs is controlled by
  # each task's rl_games_ppo_cfg.yaml directly.
  command_template: "bash quickstart.sh {task}"
  # Seed-aware alternative (calls the trainer directly through Isaac Lab's wrapper):
  # command_template: "/workspace/isaaclab/isaaclab.sh -p scripts/train.py --task {task} --headless --seed {seed}"
