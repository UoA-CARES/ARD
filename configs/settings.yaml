# ARD pipeline settings
# ---------------------

# Path to the ard-isaaclab-tasks checkout — the RL task substrate ARD trains
# against. Each candidate reward is injected into a task env file inside a fresh
# copy of this repo, packaged, and submitted to the coordinator.
tasks_repo: "/home/lee/code/ard-isaaclab-tasks"

# Where ARD downloads artifacts and writes extracted logs / per-run records.
output_dir: "./runs"

# Parallel Coordination System (PCS) coordinator that schedules and runs the
# training jobs across registered GPU workers. ARD is a pure client of it.
#
# PCS is deploy-by-Dockerfile: every job ships the ard-isaaclab-tasks codebase
# (Dockerfile at its root), which the worker BUILDS per job — there is no
# prebuilt image tag to configure. The task image's entrypoint is driven by the
# job `env`, so ARD passes TASK (and SEED for eval runs) there automatically.
coordinator:
  base_url: "http://localhost:8000"
  # Bearer token. Preferred: export PCS_TOKEN. Alternatively set `token:` here
  # (avoid committing secrets). token_env names the env var to read.
  token_env: "PCS_TOKEN"
  gpus: 0.40
  timeout_seconds: 36000
  poll_interval: 10
  # Output paths the coordinator collects into each job's artifacts tarball.
  # The entrypoint writes the rl_games run under logs/ relative to the mount.
  output_paths: ["logs"]
  # Extra container env applied to every job (the entrypoint reads these).
  # Smoke-test setting: cap PPO iterations so each job finishes quickly.
  # env:
  #   MAX_ITERATIONS: "150"    # PPO iterations (--max_iterations)
  #   NUM_ENVS: "1024"        # parallel envs (--num_envs)
  # Optional `docker build --build-arg` values:
  # build_args: {}
  # Optional override of the image CMD (placeholders {task}, {seed}). Leave unset
  # to use the image's env-driven entrypoint (the recommended path).
  # command_template: "bash quickstart.sh {task}"
