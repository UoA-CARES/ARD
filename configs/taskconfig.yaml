# ARD task configuration
# ----------------------
# One registered ard-isaaclab-tasks task and the env file ARD edits.

# Registered task ID (see `python scripts/list_envs.py` in ard-isaaclab-tasks).
task: "Isaac-ARD-Cartpole-v0"

# Env file (relative to settings.tasks_repo) whose `_get_rewards` method is the
# ARD edit target. The reward is spliced in via AST; the fixed fitness_function
# logging in this method is preserved automatically.
env_file: "source/ard_tasks/ard_tasks/tasks/direct/cartpole/cartpole_env.py"

# Natural-language task goal, handed to the LLM reward designer.
description: >
  Balance a pole upright on a cart by applying horizontal forces to the cart.
  Keep the pole as close to vertical and the cart as close to the track centre
  as possible, for as long as possible, without the pole falling past the
  vertical limit or the cart leaving its bounds.

# RL training iterations (max_epochs) per job.
max_iterations: 100

# To refine a different task without editing this file, use the task's registered
# name directly — it resolves to that task's ard_meta.yaml inside settings.tasks_repo:
#   python main.py --refine --task humanoid
# List available task names with: python scripts/list_envs.py (in ard-isaaclab-tasks),
# or look under source/ard_tasks/ard_tasks/tasks/direct/*/ard_meta.yaml.
